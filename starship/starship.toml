"$schema" = 'https://starship.rs/config-schema.json'

format = """
\\[$username\
$hostname\
$directory\
\\] $git_branch\
$git_state\
$git_status\
$line_break\
$python\
$character"""

[username]
style_user = "green"
style_root = "red"
format = "[$user]($style)"
show_always = true

[hostname]
style = "blue"
ssh_only = false
format = "[@$hostname]($style)"

[directory]
style = "blue"
format = "[ $path]($style)"

[character]
success_symbol = "[‚ùØ](purple)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](green)"

[git_branch]
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []
